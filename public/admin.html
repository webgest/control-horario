<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Control Horario Webgest</title>
<style>
:root{--p:#1a56a0;--pd:#123d7a;--pl:#dbeafe;--s:#16a34a;--sl:#dcfce7;--d:#dc2626;--dl:#fee2e2;--w:#d97706;--wl:#fef3c7;--g0:#f9fafb;--g1:#f3f4f6;--g2:#e5e7eb;--g4:#9ca3af;--g6:#4b5563;--g7:#374151;--g8:#1f2937;--r:10px;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--g1);color:var(--g8);font-size:14px}
#sl{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pd),var(--p));padding:20px}
.lc{background:#fff;border-radius:var(--r);padding:40px 36px;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.lc h1{font-size:24px;font-weight:800;margin-bottom:6px}
.lc p{font-size:13px;color:var(--g6);margin-bottom:28px}
label{display:block;font-size:12px;font-weight:600;color:var(--g6);margin-bottom:5px}
input,select,textarea{width:100%;padding:10px 13px;border:1.5px solid var(--g2);border-radius:8px;font-size:14px;outline:none;transition:border-color .2s;background:var(--g0);font-family:inherit;margin-bottom:14px}
input:focus,select:focus,textarea:focus{border-color:var(--p);background:#fff}
textarea{resize:vertical;min-height:60px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn:disabled{opacity:.5;cursor:default}
.bp{background:var(--p);color:#fff;width:100%;justify-content:center;font-size:15px;padding:13px}.bp:hover{background:var(--pd)}
.bs{background:var(--s);color:#fff}.bd{background:var(--d);color:#fff}.bw{background:var(--w);color:#fff}
.bo{background:transparent;border:1.5px solid var(--g2);color:var(--g7)}.bo:hover{background:var(--g1)}
.bsm{padding:5px 10px;font-size:12px}
.err{background:var(--dl);color:var(--d);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
#sa{display:none}
.al{display:flex;min-height:100vh}
.sb{width:240px;flex-shrink:0;background:var(--pd);color:#fff;display:flex;flex-direction:column}
.sbr{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sbr h2{font-size:16px;font-weight:800}.sbr p{font-size:11px;opacity:.7;margin-top:2px}
.ni{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;font-size:13px;border-left:3px solid transparent;transition:background .15s}
.ni:hover{background:rgba(255,255,255,.08)}.ni.act{background:rgba(255,255,255,.12);border-left-color:#fff;font-weight:700}
.ndiv{height:1px;background:rgba(255,255,255,.1);margin:6px 0}
.sf{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)}
.sf .an{font-size:12px;opacity:.8;margin-bottom:8px}
.mc{flex:1;overflow-y:auto;background:var(--g1)}
.ph{background:#fff;padding:16px 28px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;box-shadow:var(--sh)}
.ph h1{font-size:20px;font-weight:700}.ph .fh{font-size:13px;color:var(--g6)}
.ca{padding:24px 28px}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.sc{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh)}
.sc .num{font-size:26px;font-weight:800}.sc .lbl{font-size:12px;color:var(--g6);margin-top:2px}
.ng{color:var(--s)}.nb{color:var(--p)}.no{color:var(--w)}.nr{color:var(--d)}.ngr{color:var(--g4)}
.cd{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.ch{padding:14px 20px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ch h3{font-size:15px;font-weight:700}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;background:var(--g0);color:var(--g6);font-weight:600;font-size:12px;border-bottom:1px solid var(--g2);white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid var(--g1);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--g0)}
.bk{display:inline-block;padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bkg{background:var(--sl);color:var(--s)}.bkb{background:var(--pl);color:var(--p)}.bko{background:var(--wl);color:var(--w)}.bkr{background:var(--dl);color:var(--d)}.bkgr{background:var(--g1);color:var(--g6)}
.fi{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;padding:12px 20px;background:var(--g0);border-bottom:1px solid var(--g2)}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;font-weight:600;color:var(--g6);margin-bottom:0}
.fg select,.fg input{width:auto;min-width:130px;padding:6px 10px;margin-bottom:0}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.md{background:#fff;border-radius:var(--r);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mh{padding:16px 22px;border-bottom:1px solid var(--g2);display:flex;align-items:center;justify-content:space-between}
.mh h2{font-size:16px;font-weight:700}.bc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--g6)}
.mb2{padding:18px 22px}.mf{padding:12px 22px;border-top:1px solid var(--g2);display:flex;gap:8px;justify-content:flex-end}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--g8);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:var(--sh);opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.ar td{background:var(--wl)!important}
.pi{color:var(--w);font-size:11px}.pg{display:none}.pg.act{display:block}
.es{text-align:center;padding:40px;color:var(--g4)}.sp{text-align:center;padding:30px;color:var(--g4)}
@media(max-width:700px){.sb{width:100%;height:auto;flex-direction:row;overflow-x:auto}.al{flex-direction:column}.ca{padding:12px}}
</style>
</head>
<body>
<div id="sl">
  <div class="lc">
    <h1>Acceso Webgest</h1>
    <p>Panel de administracion</p>
    <div id="le" class="err"></div>
    <label>Contrasena</label>
    <input type="password" id="pp" placeholder="Webgest2026!" autofocus autocomplete="current-password">
    <button class="btn bp" id="blb" onclick="doLogin()">Entrar al panel</button>
  </div>
</div>
